<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Celticly</title>
    <style>
      /* â”€â”€ Theme tokens â”€â”€ */
      :root {
        --bg: #ffffff;
        --bg-surface: #f7f7f8;
        --bg-hover: #f0fdf4;
        --border: #e2e2e7;
        --text: #1c1c1e;
        --text-muted: #636366;
        --text-light: #aeaeb2;
        --accent: #16a34a;
        --accent-hover: #15803d;
        --accent-fg: #ffffff;
        --accent-subtle: #dcfce7;
        --danger-bg: #fef2f2;
        --danger-border: #fecaca;
        --danger-text: #dc2626;
        --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.07);
        --shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        --radius: 12px;
      }

      [data-theme="dark"] {
        --bg: #1c1c2e;
        --bg-surface: rgba(255, 255, 255, 0.04);
        --bg-hover: rgba(52, 211, 153, 0.12);
        --border: rgba(255, 255, 255, 0.08);
        --text: #f2f2f7;
        --text-muted: #aeaeb2;
        --text-light: #636366;
        --accent: #34d399;
        --accent-hover: #10b981;
        --accent-fg: #022c22;
        --accent-subtle: rgba(52, 211, 153, 0.14);
        --danger-bg: rgba(252, 129, 129, 0.1);
        --danger-border: rgba(252, 129, 129, 0.25);
        --danger-text: #fc8181;
        --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
        --shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        width: 300px;
        background: var(--bg);
        color: var(--text);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 14px;
        line-height: 1.5;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 16px 12px;
        background: var(--bg);
        border-bottom: 1px solid var(--border);
      }

      .brand-logo {
        height: 28px;
        width: auto;
        display: block;
      }

      /* Toggle */
      .toggle-wrap {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .toggle-label {
        font-size: 11px;
        color: var(--text-muted);
        font-weight: 500;
      }

      .toggle {
        position: relative;
        width: 36px;
        height: 20px;
      }
      .toggle input {
        opacity: 0;
        width: 0;
        height: 0;
      }
      .toggle-slider {
        position: absolute;
        inset: 0;
        background: var(--border);
        border-radius: 20px;
        cursor: pointer;
        transition: background 0.2s;
      }
      .toggle-slider:before {
        content: "";
        position: absolute;
        width: 14px;
        height: 14px;
        background: #fff;
        border-radius: 50%;
        top: 3px;
        left: 3px;
        transition: transform 0.2s;
        box-shadow: var(--shadow-sm);
      }
      input:checked + .toggle-slider {
        background: var(--accent);
      }
      input:checked + .toggle-slider:before {
        transform: translateX(16px);
      }

      /* Sections */
      .section {
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
      }

      .section-title {
        font-size: 10px;
        font-weight: 700;
        color: var(--text-light);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 10px;
      }

      /* Stats */
      .stat-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .stat-count {
        font-size: 28px;
        font-weight: 700;
        color: var(--accent);
        line-height: 1;
      }
      .stat-label {
        font-size: 12px;
        color: var(--text-muted);
        margin-top: 2px;
      }

      /* Buttons */
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 6px 12px;
        border-radius: 8px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        border: none;
        transition: background 0.15s;
        text-decoration: none;
      }
      .btn-primary {
        background: var(--accent);
        color: var(--accent-fg);
      }
      .btn-primary:hover {
        background: var(--accent-hover);
      }
      .btn-secondary {
        background: var(--bg-surface);
        color: var(--text-muted);
        border: 1px solid var(--border);
      }
      .btn-secondary:hover {
        background: var(--border);
      }

      /* Recent list */
      .recent-list {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 5px;
      }
      .recent-item {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        background: var(--bg-surface);
        border-radius: 8px;
        padding: 7px 10px;
        gap: 8px;
        border: 1px solid var(--border);
        transition: background 0.1s;
      }
      .recent-item:hover {
        background: var(--bg-hover);
      }
      .recent-source {
        font-size: 11px;
        color: var(--text-muted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 120px;
      }
      .recent-irish {
        font-size: 13px;
        font-weight: 600;
        color: var(--text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 130px;
      }

      .empty-state {
        text-align: center;
        padding: 14px 0;
        color: var(--text-light);
        font-size: 12px;
        line-height: 1.6;
      }

      .footer {
        padding: 10px 16px;
        display: flex;
        gap: 8px;
        justify-content: flex-end;
      }

      .api-key-missing {
        background: var(--danger-bg);
        border: 1px solid var(--danger-border);
        border-radius: 8px;
        padding: 8px 10px;
        font-size: 12px;
        color: var(--danger-text);
      }
      .api-key-missing a {
        color: var(--danger-text);
        font-weight: 600;
      }

      #status-msg {
        font-size: 11px;
        color: var(--accent);
        min-height: 14px;
        font-weight: 500;
      }

      /* Test yourself */
      .test-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 10px;
      }
      .test-row-label {
        font-size: 12px;
        color: var(--text-muted);
        white-space: nowrap;
        min-width: 72px;
      }
      .test-row-label strong {
        color: var(--accent);
      }
      .test-slider {
        flex: 1;
        accent-color: var(--accent);
        cursor: pointer;
        height: 4px;
      }
      .btn-full {
        width: 100%;
        justify-content: center;
      }
    </style>
  </head>
  <body>
    <header>
      <div>
        <img src="media/celticly.png" class="brand-logo" alt="Celticly" />
      </div>
      <div class="toggle-wrap">
        <span class="toggle-label" id="enabled-label">On</span>
        <label class="toggle" title="Enable/disable translation on pages">
          <input type="checkbox" id="enabled-toggle" checked />
          <span class="toggle-slider"></span>
        </label>
      </div>
    </header>

    <div class="section">
      <div class="section-title">Word Bank</div>
      <div class="stat-row">
        <div>
          <div class="stat-count" id="word-count">â€“</div>
          <div class="stat-label">words saved</div>
        </div>
        <span id="status-msg"></span>
      </div>
    </div>

    <div class="section" id="recent-section">
      <div class="section-title">Recent saves</div>
      <ul class="recent-list" id="recent-list"></ul>
    </div>

    <div class="section" id="test-section">
      <div class="section-title">Test Yourself</div>
      <div class="test-row">
        <span class="test-row-label"
          >Words: <strong id="test-count-label">10</strong></span
        >
        <input
          type="range"
          id="test-word-count"
          class="test-slider"
          min="3"
          max="30"
          step="1"
          value="10"
        />
      </div>
      <button class="btn btn-primary btn-full" id="test-start-btn">
        &#9654; Start Test
      </button>
    </div>

    <div class="footer">
      <a href="#" class="btn btn-secondary" id="open-options"
        >&#9881; Options</a
      >
    </div>

    <script src="dist/popup.js"></script>
  </body>
</html>
