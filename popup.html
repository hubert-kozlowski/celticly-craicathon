<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cúpla Focal</title>
    <style>
      /* ── Theme tokens ── */
      :root {
        --bg:           #FFFFFF;
        --bg-surface:   #F7F7F8;
        --bg-hover:     #F0FDF4;
        --border:       #E2E2E7;
        --text:         #1C1C1E;
        --text-muted:   #636366;
        --text-light:   #AEAEB2;
        --accent:       #16A34A;
        --accent-hover: #15803D;
        --accent-fg:    #FFFFFF;
        --accent-subtle:#DCFCE7;
        --danger-bg:    #FEF2F2;
        --danger-border:#FECACA;
        --danger-text:  #DC2626;
        --shadow-sm:    0 1px 3px rgba(0,0,0,0.07);
        --shadow:       0 2px 12px rgba(0,0,0,0.08);
        --radius:       12px;
      }

      [data-theme="dark"] {
        --bg:           #1C1C2E;
        --bg-surface:   rgba(255,255,255,0.04);
        --bg-hover:     rgba(52,211,153,0.12);
        --border:       rgba(255,255,255,0.08);
        --text:         #F2F2F7;
        --text-muted:   #AEAEB2;
        --text-light:   #636366;
        --accent:       #34D399;
        --accent-hover: #10B981;
        --accent-fg:    #022C22;
        --accent-subtle:rgba(52,211,153,0.14);
        --danger-bg:    rgba(252,129,129,0.10);
        --danger-border:rgba(252,129,129,0.25);
        --danger-text:  #FC8181;
        --shadow-sm:    0 1px 3px rgba(0,0,0,0.3);
        --shadow:       0 2px 12px rgba(0,0,0,0.4);
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        width: 300px;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 14px;
        line-height: 1.5;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 16px 12px;
        background: var(--bg);
        border-bottom: 1px solid var(--border);
      }

      .brand {
        font-size: 16px;
        font-weight: 700;
        color: var(--accent);
        letter-spacing: -0.3px;
      }

      .brand-sub {
        font-size: 11px;
        color: var(--text-light);
        margin-top: 1px;
      }

      /* Toggle */
      .toggle-wrap { display: flex; align-items: center; gap: 8px; }
      .toggle-label { font-size: 11px; color: var(--text-muted); font-weight: 500; }

      .toggle { position: relative; width: 36px; height: 20px; }
      .toggle input { opacity: 0; width: 0; height: 0; }
      .toggle-slider {
        position: absolute; inset: 0;
        background: var(--border);
        border-radius: 20px; cursor: pointer;
        transition: background 0.2s;
      }
      .toggle-slider:before {
        content: ""; position: absolute;
        width: 14px; height: 14px;
        background: #fff; border-radius: 50%;
        top: 3px; left: 3px;
        transition: transform 0.2s;
        box-shadow: var(--shadow-sm);
      }
      input:checked + .toggle-slider { background: var(--accent); }
      input:checked + .toggle-slider:before { transform: translateX(16px); }

      /* Sections */
      .section {
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
      }

      .section-title {
        font-size: 10px;
        font-weight: 700;
        color: var(--text-light);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 10px;
      }

      /* Stats */
      .stat-row { display: flex; justify-content: space-between; align-items: center; }
      .stat-count { font-size: 28px; font-weight: 700; color: var(--accent); line-height: 1; }
      .stat-label { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

      /* Buttons */
      .btn {
        display: inline-flex; align-items: center; gap: 5px;
        padding: 6px 12px; border-radius: 8px;
        font-size: 12px; font-weight: 600;
        cursor: pointer; border: none;
        transition: background 0.15s;
        text-decoration: none;
      }
      .btn-primary { background: var(--accent); color: var(--accent-fg); }
      .btn-primary:hover { background: var(--accent-hover); }
      .btn-secondary {
        background: var(--bg-surface);
        color: var(--text-muted);
        border: 1px solid var(--border);
      }
      .btn-secondary:hover { background: var(--border); }

      /* Recent list */
      .recent-list { list-style: none; display: flex; flex-direction: column; gap: 5px; }
      .recent-item {
        display: flex; justify-content: space-between; align-items: flex-start;
        background: var(--bg-surface);
        border-radius: 8px; padding: 7px 10px; gap: 8px;
        border: 1px solid var(--border);
        transition: background 0.1s;
      }
      .recent-item:hover { background: var(--bg-hover); }
      .recent-source {
        font-size: 11px; color: var(--text-muted);
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 120px;
      }
      .recent-irish {
        font-size: 13px; font-weight: 600; color: var(--text);
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 130px;
      }

      .empty-state {
        text-align: center; padding: 14px 0;
        color: var(--text-light); font-size: 12px; line-height: 1.6;
      }

      .footer {
        padding: 10px 16px; display: flex; gap: 8px; justify-content: flex-end;
      }

      .api-key-missing {
        background: var(--danger-bg);
        border: 1px solid var(--danger-border);
        border-radius: 8px; padding: 8px 10px;
        font-size: 12px; color: var(--danger-text);
      }
      .api-key-missing a { color: var(--danger-text); font-weight: 600; }

      #status-msg { font-size: 11px; color: var(--accent); min-height: 14px; font-weight: 500; }
    </style>
  </head>
  <body>
    <header>
      <div>
        <div class="brand">Cúpla Focal</div>
        <div class="brand-sub">Irish Translation</div>
      </div>
      <div class="toggle-wrap">
        <span class="toggle-label" id="enabled-label">On</span>
        <label class="toggle" title="Enable/disable translation on pages">
          <input type="checkbox" id="enabled-toggle" checked />
          <span class="toggle-slider"></span>
        </label>
      </div>
    </header>

    <div class="section" id="key-warning" style="display: none">
      <div class="api-key-missing">
        ⚠ No API key set.
        <a href="#" id="open-options-key">Open options →</a>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Word Bank</div>
      <div class="stat-row">
        <div>
          <div class="stat-count" id="word-count">–</div>
          <div class="stat-label">words saved</div>
        </div>
        <span id="status-msg"></span>
      </div>
    </div>

    <div class="section" id="recent-section">
      <div class="section-title">Recent saves</div>
      <ul class="recent-list" id="recent-list"></ul>
    </div>

    <div class="footer">
      <a href="#" class="btn btn-secondary" id="open-options">⚙ Options</a>
    </div>

    <script src="dist/popup.js"></script>
  </body>
</html>
