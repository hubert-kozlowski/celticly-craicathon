<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cúpla Focal</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        width: 300px;
        background: #1a1a2e;
        color: #e0e0e0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 14px;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 16px 12px;
        background: #16213e;
        border-bottom: 1px solid rgba(255, 255, 255, 0.07);
      }

      .brand {
        font-size: 16px;
        font-weight: 700;
        color: #16c784;
        letter-spacing: -0.3px;
      }

      .brand-sub {
        font-size: 11px;
        color: #777;
        margin-top: 1px;
      }

      .toggle-wrap {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .toggle-label {
        font-size: 11px;
        color: #888;
      }

      .toggle {
        position: relative;
        width: 36px;
        height: 20px;
      }

      .toggle input {
        opacity: 0;
        width: 0;
        height: 0;
      }

      .toggle-slider {
        position: absolute;
        inset: 0;
        background: #333;
        border-radius: 20px;
        cursor: pointer;
        transition: background 0.2s;
      }

      .toggle-slider:before {
        content: "";
        position: absolute;
        width: 14px;
        height: 14px;
        background: #fff;
        border-radius: 50%;
        top: 3px;
        left: 3px;
        transition: transform 0.2s;
      }

      input:checked + .toggle-slider {
        background: #16c784;
      }
      input:checked + .toggle-slider:before {
        transform: translateX(16px);
      }

      .section {
        padding: 12px 16px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }

      .section-title {
        font-size: 11px;
        font-weight: 600;
        color: #888;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 10px;
      }

      .stat-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .stat-count {
        font-size: 28px;
        font-weight: 700;
        color: #16c784;
        line-height: 1;
      }

      .stat-label {
        font-size: 12px;
        color: #888;
        margin-top: 2px;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 6px 12px;
        border-radius: 6px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        border: none;
        transition: background 0.15s;
        text-decoration: none;
      }

      .btn-primary {
        background: #16c784;
        color: #0a0a16;
      }
      .btn-primary:hover {
        background: #12b070;
      }
      .btn-secondary {
        background: rgba(255, 255, 255, 0.08);
        color: #ccc;
      }
      .btn-secondary:hover {
        background: rgba(255, 255, 255, 0.14);
      }

      .recent-list {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .recent-item {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        background: rgba(255, 255, 255, 0.04);
        border-radius: 6px;
        padding: 7px 10px;
        gap: 8px;
      }

      .recent-source {
        font-size: 11px;
        color: #888;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 120px;
      }

      .recent-irish {
        font-size: 13px;
        font-weight: 600;
        color: #fff;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 130px;
      }

      .empty-state {
        text-align: center;
        padding: 14px 0;
        color: #555;
        font-size: 12px;
      }

      .footer {
        padding: 10px 16px;
        display: flex;
        gap: 8px;
        justify-content: flex-end;
      }

      .api-key-missing {
        background: rgba(255, 107, 107, 0.12);
        border: 1px solid rgba(255, 107, 107, 0.25);
        border-radius: 6px;
        padding: 8px 10px;
        font-size: 12px;
        color: #ff9c9c;
        margin-bottom: 4px;
      }

      #status-msg {
        font-size: 11px;
        color: #16c784;
        min-height: 14px;
      }
    </style>
  </head>
  <body>
    <header>
      <div>
        <div class="brand">Cúpla Focal</div>
        <div class="brand-sub">Irish Translation</div>
      </div>
      <div class="toggle-wrap">
        <span class="toggle-label" id="enabled-label">On</span>
        <label class="toggle" title="Enable/disable translation on pages">
          <input type="checkbox" id="enabled-toggle" checked />
          <span class="toggle-slider"></span>
        </label>
      </div>
    </header>

    <div class="section" id="key-warning" style="display: none">
      <div class="api-key-missing">
        ⚠ No API key set.
        <a href="#" id="open-options-key" style="color: #ffa9a9"
          >Open options →</a
        >
      </div>
    </div>

    <div class="section">
      <div class="section-title">Word Bank</div>
      <div class="stat-row">
        <div>
          <div class="stat-count" id="word-count">–</div>
          <div class="stat-label">words saved</div>
        </div>
        <span id="status-msg"></span>
      </div>
    </div>

    <div class="section" id="recent-section">
      <div class="section-title">Recent saves</div>
      <ul class="recent-list" id="recent-list"></ul>
    </div>

    <div class="footer">
      <a href="#" class="btn btn-secondary" id="open-options">⚙ Options</a>
    </div>

    <script src="dist/popup.js"></script>
  </body>
</html>
