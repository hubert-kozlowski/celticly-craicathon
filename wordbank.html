<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Celticly &#8211; Word Bank</title>
    <style>
      /* ─── Theme tokens ─── */
      :root {
        --bg: #f7f7f8;
        --bg-card: #ffffff;
        --bg-input: #ffffff;
        --border: #e2e2e7;
        --border-focus: #16a34a;
        --text: #1c1c1e;
        --text-muted: #636366;
        --text-light: #aeaeb2;
        --accent: #16a34a;
        --accent-hover: #15803d;
        --accent-fg: #ffffff;
        --accent-subtle: #dcfce7;
        --danger-bg: rgba(220, 38, 38, 0.08);
        --danger-text: #dc2626;
        --danger-hover: rgba(220, 38, 38, 0.16);
        --shadow-card:
          0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
        --radius: 12px;
      }

      [data-theme="dark"] {
        --bg: #111118;
        --bg-card: #1c1c2e;
        --bg-input: #0e0e1a;
        --border: rgba(255, 255, 255, 0.08);
        --border-focus: #34d399;
        --text: #f2f2f7;
        --text-muted: #aeaeb2;
        --text-light: #636366;
        --accent: #34d399;
        --accent-hover: #10b981;
        --accent-fg: #022c22;
        --accent-subtle: rgba(52, 211, 153, 0.14);
        --danger-bg: rgba(252, 129, 129, 0.1);
        --danger-text: #fc8181;
        --danger-hover: rgba(252, 129, 129, 0.2);
        --shadow-card: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        max-width: 900px;
        margin: 0 auto;
        padding: 32px 24px 48px;
        background: var(--bg);
        color: var(--text);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 14px;
        line-height: 1.6;
        transition:
          background 0.2s,
          color 0.2s;
      }

      .page-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        margin-bottom: 28px;
        gap: 16px;
      }

      .page-title {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .page-logo {
        height: 42px;
        width: auto;
        display: block;
      }

      .page-sub {
        font-size: 13px;
        color: var(--text-muted);
      }

      /* Cards */
      .card {
        background: var(--bg-card);
        border-radius: var(--radius);
        padding: 20px 24px;
        margin-bottom: 16px;
        border: 1px solid var(--border);
        box-shadow: var(--shadow-card);
        transition:
          background 0.2s,
          border-color 0.2s;
      }

      .card-title {
        font-size: 11px;
        font-weight: 700;
        color: var(--accent);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 16px;
      }

      /* Buttons */
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 8px 16px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        border: none;
        transition:
          background 0.15s,
          box-shadow 0.15s;
      }

      .btn-primary {
        background: var(--accent);
        color: var(--accent-fg);
        box-shadow: 0 1px 4px rgba(22, 163, 74, 0.2);
      }

      .btn-primary:hover {
        background: var(--accent-hover);
        box-shadow: 0 2px 8px rgba(22, 163, 74, 0.3);
      }

      .btn-secondary {
        background: var(--bg);
        color: var(--text-muted);
        border: 1px solid var(--border);
      }

      .btn-secondary:hover {
        background: var(--border);
      }

      .btn-danger {
        background: var(--danger-bg);
        color: var(--danger-text);
      }

      .btn-danger:hover {
        background: var(--danger-hover);
      }

      .btn-small {
        padding: 4px 12px;
        font-size: 12px;
      }

      /* Word bank toolbar */
      .wb-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 16px;
        flex-wrap: wrap;
      }

      .wb-count {
        font-size: 13px;
        color: var(--text-muted);
        font-weight: 500;
      }

      .wb-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .wb-search {
        flex: 1;
        min-width: 200px;
        max-width: 300px;
      }

      .wb-search input {
        width: 100%;
        padding: 8px 12px;
        background: var(--bg-input);
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--text);
        font-size: 13px;
        outline: none;
        transition:
          border-color 0.15s,
          box-shadow 0.15s;
      }

      .wb-search input:focus {
        border-color: var(--border-focus);
        box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 15%, transparent);
      }

      .wb-search input::placeholder {
        color: var(--text-light);
      }

      /* Table styles */
      .wb-table-wrap {
        overflow-x: auto;
        border-radius: 8px;
        border: 1px solid var(--border);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }

      thead th {
        background: var(--bg);
        padding: 10px 12px;
        text-align: left;
        font-weight: 700;
        color: var(--text-light);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        border-bottom: 1px solid var(--border);
        white-space: nowrap;
      }

      tbody tr {
        border-bottom: 1px solid var(--border);
        transition: background 0.1s;
      }

      tbody tr:last-child {
        border-bottom: none;
      }

      tbody tr:hover {
        background: var(--bg);
      }

      tbody td {
        padding: 10px 12px;
        vertical-align: middle;
      }

      .td-word-pair {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .word-irish {
        font-weight: 600;
        color: var(--text);
      }

      .word-arrow {
        color: var(--text-light);
        font-size: 12px;
        flex-shrink: 0;
      }

      .word-english {
        color: var(--text-muted);
        font-size: 13px;
      }

      .td-date {
        color: var(--text-light);
        font-size: 12px;
        white-space: nowrap;
      }

      .td-actions {
        text-align: right;
        width: 50px;
        white-space: nowrap;
      }

      .delete-btn {
        background: none;
        border: none;
        cursor: pointer;
        color: var(--text-light);
        font-size: 16px;
        border-radius: 4px;
        padding: 4px 6px;
        transition:
          color 0.1s,
          background 0.1s;
        line-height: 1;
      }

      .delete-btn:hover {
        color: var(--danger-text);
        background: var(--danger-bg);
      }

      .empty-wb {
        padding: 32px 16px;
        text-align: center;
        color: var(--text-light);
        font-size: 14px;
      }

      /* Responsive */
      @media (max-width: 600px) {
        body {
          padding: 24px 16px 40px;
        }

        .page-header {
          flex-direction: column;
          gap: 12px;
        }

        .page-logo {
          height: 36px;
        }

        .wb-toolbar {
          flex-direction: column;
          align-items: stretch;
        }

        .wb-search {
          max-width: 100%;
        }

        .wb-actions {
          width: 100%;
        }

        tbody td {
          padding: 8px;
          font-size: 12px;
        }

        .td-word-pair {
          flex-direction: column;
          align-items: flex-start;
          gap: 2px;
        }

        .word-arrow {
          display: none;
        }

        thead th,
        .td-date {
          display: none;
        }

        table,
        tbody,
        tr,
        td {
          display: block;
          width: 100%;
        }

        tr {
          margin-bottom: 12px;
          border-bottom: 1px solid var(--border) !important;
          padding: 12px 0;
        }

        td {
          padding: 4px 0 !important;
          text-align: left;
        }

        .td-actions {
          text-align: left;
          margin-top: 8px;
        }
      }
    </style>
  </head>
  <body>
    <div class="page-header">
      <div class="page-title">
        <img src="media/celticlysub.png" class="page-logo" alt="Celticly" />
        <p class="page-sub">Word Bank</p>
      </div>
    </div>

    <!-- Word Bank -->
    <div class="card">
      <div class="card-title">Your Words</div>

      <div class="wb-toolbar">
        <span class="wb-count" id="wb-count">0 words saved</span>
        <div class="wb-search">
          <input
            type="text"
            id="search-input"
            placeholder="Search by English or Irish..."
          />
        </div>
        <div class="wb-actions">
          <button class="btn btn-secondary btn-small" id="export-btn">
            Export Flash Cards
          </button>
          <button class="btn btn-danger btn-small" id="clear-wb-btn">
            Clear All
          </button>
        </div>
      </div>

      <div class="wb-table-wrap">
        <table>
          <thead>
            <tr>
              <th>Word Pair</th>
              <th>Saved</th>
              <th class="td-actions"></th>
            </tr>
          </thead>
          <tbody id="wb-tbody">
            <tr>
              <td colspan="3" class="empty-wb">Loading…</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <script src="dist/wordbank.js"></script>
  </body>
</html>
